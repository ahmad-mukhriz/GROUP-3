<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alumni Connect Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #d80000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 800px;
        height: 450px;
        display: flex;
        background: #fff;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .left {
        width: 50%;
        background: url('https://plus.unsplash.com/premium_photo-1713296255442-e9338f42aad8?q=80&w=722&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center;
        background-size: cover;
    }

    .right {
        width: 50%;
        padding: 40px;
    }

    h2 {
        margin-bottom: 20px;
        border-bottom: 2px solid #d80000;
        display: inline-block;
        padding-bottom: 5px;
    }

    label {
        font-size: 14px;
        margin-top: 10px;
        display: block;
    }

    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: none;
        background: #eee;
    }

    .remember {
        margin-top: 10px;
    }

    .remember label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .remember input {
        width: auto;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #d80000;
        color: white;
        border: none;
        cursor: pointer;
        display: block;
        text-align: center;
        text-decoration: none;
    }

    .btn:hover {
        background: #b00000;
    }

    .links {
        margin-top: 15px;
        font-size: 13px;
    }

    .links a {
        text-decoration: none;
        color: #555;
        display: block;
        margin-top: 5px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="left"></div>

    <div class="right">
        <h2>Login</h2>

        <form action="dashboard.html">
            <label>Email *</label>
            <input type="email" placeholder="Enter your Email" required>

            <label>Password *</label>
            <input type="password" placeholder="Enter your Password" required>

            <div class="remember">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>
            </div>

            <button class="btn" type="submit">LOGIN</button>
        </form>

        <div class="links">
            <a href="#">Forgot password?</a>
            <a href="register.html">Don't have an account?</a>
        </div>
    </div>

</div>

</body>
</html>
